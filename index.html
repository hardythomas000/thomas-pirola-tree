<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Thomas–Pirola Family Tree</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f12;
    --bg-warm: #141318;
    --text: #e8e4df;
    --text-dim: #8a857e;
    --thomas: #c4956a;
    --thomas-dim: #6b5540;
    --pirola: #7a9eb5;
    --pirola-dim: #3d5563;
    --gibson: #8db580;
    --gibson-dim: #4a6342;
    --barlow: #b5a0c4;
    --barlow-dim: #5c4f6b;
    --spalding: #c49a9a;
    --spalding-dim: #6b4f4f;
    --youl: #c4b96a;
    --youl-dim: #6b6540;
    --link: rgba(255,255,255,0.06);
    --link-hover: rgba(255,255,255,0.18);
    --link-parent: rgba(200,190,170,0.35);
    --link-spouse: rgba(200,190,170,0.18);
  }

  .light-mode {
    --bg: #f5f2ed;
    --bg-warm: #eae6e0;
    --text: #1a1510;
    --text-dim: #55504a;
    --thomas: #9a6d3f;
    --thomas-dim: #d4b896;
    --pirola: #4a7a90;
    --pirola-dim: #a3c4d4;
    --gibson: #5a8a50;
    --gibson-dim: #b0d4a6;
    --barlow: #7a5a94;
    --barlow-dim: #c8b4d8;
    --spalding: #945a5a;
    --spalding-dim: #d4a8a8;
    --youl: #8a8030;
    --youl-dim: #d4cc8a;
    --link-parent: rgba(60,50,40,0.3);
    --link-spouse: rgba(60,50,40,0.15);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    -webkit-tap-highlight-color: transparent;
  }

  svg { display: block; width: 100%; height: 100%; }

  #info-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg-warm);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 20px 24px 28px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 10;
    max-height: 55vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #info-panel.open { transform: translateY(0); }
  #info-panel .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 0.02em;
    margin-bottom: 4px;
  }
  #info-panel .dates {
    font-size: 13px;
    color: var(--text);
    opacity: 0.6;
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }
  #info-panel .detail {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    opacity: 0.85;
    max-width: 640px;
  }
  #info-panel .detail li {
    margin-bottom: 4px;
    list-style: none;
    padding-left: 12px;
    position: relative;
  }
  #info-panel .detail li::before {
    content: '·';
    position: absolute;
    left: 0;
    color: var(--text-dim);
  }
  #info-panel .family-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 3px;
    margin-bottom: 10px;
  }
  #info-panel .close-btn {
    position: absolute;
    top: 16px; right: 20px;
    background: none; border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
  }

  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 20px 24px 14px;
    z-index: 5;
    pointer-events: none;
  }
  #header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }

  #legend {
    position: fixed;
    top: 56px; left: 24px;
    z-index: 5;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    pointer-events: auto;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 3px;
    transition: background 0.2s;
  }
  .legend-item:hover { background: rgba(255,255,255,0.04); }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  #controls {
    position: fixed;
    bottom: 16px; right: 16px;
    z-index: 5;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .ctrl-btn {
    width: 36px; height: 36px;
    background: var(--bg-warm);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .ctrl-btn.theme-toggle { font-size: 14px; }
  .ctrl-btn.add-btn { font-size: 18px; font-weight: 300; }

  #add-panel {
    position: fixed;
    top: 0; right: 0;
    width: min(300px, 85vw); height: 100vh;
    background: var(--bg-warm);
    border-left: 1px solid rgba(255,255,255,0.08);
    z-index: 20;
    padding: 20px;
    overflow-y: auto;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    transform: translateX(100%);
  }
  #add-panel.open { transform: translateX(0); }
  #add-panel h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 300;
    color: var(--text);
    margin-bottom: 16px;
  }
  #add-panel label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 12px 0 4px;
  }
  #add-panel input, #add-panel select, #add-panel textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 10px 12px;
    -webkit-appearance: none;
  }
  #add-panel textarea { min-height: 80px; resize: vertical; }
  #add-panel select option { background: var(--bg); }
  .form-row { display: flex; gap: 8px; }
  .form-row > * { flex: 1; }
  .form-actions { display: flex; gap: 8px; margin-top: 16px; }
  .form-actions button {
    flex: 1; padding: 10px;
    border: none; border-radius: 4px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
  }
  .btn-save { background: var(--thomas); color: #0f0f12; }
  .btn-cancel { background: rgba(255,255,255,0.08); color: var(--text-dim); }
  .btn-export { background: rgba(255,255,255,0.06); color: var(--text-dim); margin-top: 8px; width: 100%; padding: 8px; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; font-size: 11px; cursor: pointer; }
  .added-count { font-size: 11px; color: var(--text-dim); margin-top: 12px; }

  .node-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    fill: var(--text-dim);
    pointer-events: none;
    text-anchor: middle;
    letter-spacing: 0.02em;
    paint-order: stroke;
    stroke: var(--bg);
    stroke-width: 3px;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .node-label-main {
    font-size: 12px;
    fill: var(--text);
    font-weight: 500;
  }
</style>
</head>
<body>

<div id="header">
  <h1>THOMAS · PIROLA</h1>
</div>

<div id="legend"></div>

<svg id="graph"></svg>

<div id="info-panel">
  <button class="close-btn" onclick="closePanel()">×</button>
  <div id="panel-content"></div>
</div>

<div id="controls">
  <button class="ctrl-btn add-btn" onclick="toggleAddPanel()" title="Add person">＋</button>
  <button class="ctrl-btn" onclick="zoomIn()">+</button>
  <button class="ctrl-btn" onclick="zoomOut()">−</button>
  <button class="ctrl-btn" onclick="resetView()">⟲</button>
  <button class="ctrl-btn theme-toggle" onclick="toggleTheme()" id="theme-btn">☀</button>
</div>

<div id="add-panel">
  <h3>Add Person</h3>
  <label>Name</label>
  <input type="text" id="add-name" placeholder="Full name">
  <label>Family</label>
  <select id="add-family">
    <option value="thomas">Thomas</option>
    <option value="pirola">Pirola</option>
    <option value="gibson">Gibson</option>
    <option value="barlow">Barlow</option>
    <option value="spalding">Spalding</option>
    <option value="youl">Youl</option>
    <option value="other">Other</option>
  </select>
  <label>Dates</label>
  <input type="text" id="add-dates" placeholder="e.g. 1850–1920">
  <div class="form-row">
    <div>
      <label>Link to</label>
      <select id="add-link-target"></select>
    </div>
    <div>
      <label>Relationship</label>
      <select id="add-link-type">
        <option value="parent">Child of</option>
        <option value="spouse">Spouse of</option>
      </select>
    </div>
  </div>
  <label>Details (one per line)</label>
  <textarea id="add-details" placeholder="Born in...&#10;Married...&#10;Died..."></textarea>
  <label><input type="checkbox" id="add-key"> Key ancestor</label>
  <div class="form-actions">
    <button class="btn-save" onclick="addPerson()">Add</button>
    <button class="btn-cancel" onclick="toggleAddPanel()">Cancel</button>
  </div>
  <button class="btn-export" onclick="exportAdded()">Export added people (copy)</button>
  <div class="added-count" id="added-count"></div>
</div>

<script>
const families = {
  thomas: { color: '#c4956a', dim: '#6b5540', label: 'Thomas' },
  pirola: { color: '#7a9eb5', dim: '#3d5563', label: 'Pirola' },
  gibson: { color: '#8db580', dim: '#4a6342', label: 'Gibson' },
  barlow: { color: '#b5a0c4', dim: '#5c4f6b', label: 'Barlow' },
  spalding: { color: '#c49a9a', dim: '#6b4f4f', label: 'Spalding' },
  youl: { color: '#c4b96a', dim: '#6b6540', label: 'Youl' },
  other: { color: '#888', dim: '#555', label: 'Other' }
};

const nodes = [
  // THOMAS — Wales & English Civil War
  { id: 'col_lewys', name: 'Col. Lewys Thomas', family: 'thomas', gen: -3, dates: 'd. 1648', detail: ['Lt Colonel Lewys Thomas — son or brother of Sir Edward Thomas, 1st Baronet of Michaelstown, Glamorgan','Part of the THOMAS BARONETS OF MICHAELSTOWN: Sir Edward (1st Bt, d.1673), Sir Robert (2nd Bt, MP Cardiff 1661-81)','Sheriff of Glamorgan (1624), Under-Sheriff (1631)','Royalist in English Civil War — captured at Highnam 1643, fought Battle of St Fagans 1648','Court-martialled aboard the Admiral Crowther. Estates CONFISCATED by Parliament','Married Elizabeth Stradling (daughter of Sir Edward Stradling 2nd Bt.)','Family traced back to JAMES THOMAS (fl. 1548) — Sheriff of Glamorgan 1551, built Llanmihangel Place, had 16 children. Origin: Wern Ddu, near Abergavenny, Monmouthshire','🏰 KNIGHT BANNERET (Crécy 1346): Family claimed ancestor created Knight Banneret at Battle of Crécy. Specific ancestor UNIDENTIFIED in surviving records — possibly a Thomas from the Wern Ddu lineage. Cressy, Tasmania named after this claim.','❌ NOT Rhys ap Thomas (1497 Blackheath): Research confirms Rhys ap Thomas\'s descendants became the RICE/RHYS family (Lords Dynevor, Carmarthenshire) — a completely separate lineage. The "ap Thomas" = "son of Thomas" is a patronymic, NOT a fixed surname.','📖 Key reference: G.T. Clark, *Limbus Patrum Morganiae et Glamorganiae* (1886), pp.272-273 — the Glamorgan pedigree. Available via NLW/FamilySearch.','❓ GAP: How did the family move from Glamorgan baronets → Rev. Thomas Thomas in County Wexford, Ireland? This is the weakest link — needs manuscript pedigree research.'] },
  { id: 'rev_thomas', name: 'Rev. Thomas Thomas', family: 'thomas', gen: -2, dates: 'c. 1655', detail: ['"FIRST OF OUR FAMILY IN IRELAND"','Prebendary of Clone and Kilrush','Rector in County Wexford','Based at Tyrcullen, County Carlow','The Welsh Royalist\'s son became an Irish clergyman — the pattern that would repeat for 3 generations'] },
  { id: 'rev_bart_sr', name: 'Rev. Bartholomew Thomas', family: 'thomas', gen: -1, dates: '1704–1776', detail: ['Born County Wexford, Ireland','Trinity College Dublin: entered 1722 (age 15), Scholar 1726, BA 1727, MA 1730, LL.D 1763','Rector of Ferns, Prebendary of Kilrush, Vicar of Ballyvaldon','Married his cousin Mary Connor (1705, Bandon, Cork) in 1739','Children: Dr. Daniel, Mary Mellyburne, Rev. Dr. William Bartholomew'] },
  // THOMAS — Ireland
  { id: 'rev_bart', name: 'Rev. Dr. William B. Thomas', family: 'thomas', gen: 0, dates: '1751–1826', detail: ['Rector of Cloydagh, Squire of Everton, Queen\'s County, Ireland','Trinity College Dublin: BA 1772, DD 1797','Chaplain to troops in Carlow (1800)','Buried Castle Hill, Carlow, 3 Jan 1827','Wife: Anna Jocelyn Davidson (1750), married 1779. Her parents: Jocelyn Davidson + Barbara Baker','FIVE children: Jocelyn HC, Marianne Theresa, Barbara, Capt. Bartholomew Boyle, Lt. Gen. Henry','Three sons emigrated or served abroad — two to Tasmania, one became a Lieutenant General'] },
  { id: 'lt_gen_henry', name: 'Lt. Gen. Henry Thomas', family: 'thomas', gen: 1, dates: 'c.1790–1858', detail: ['Lieutenant General in the British Army','Brother of Jocelyn and Bartholomew','Portrait survives — shown in military dress uniform with medals','Did NOT emigrate to Tasmania — stayed in the military'] },
  { id: 'jocelyn', name: 'Jocelyn H.C. Thomas', family: 'thomas', gen: 1, dates: '1780–1862', detail: ['Eton & Trinity College Dublin educated — Anglo-Irish gentry','In Ireland: agent for Lord Stanhope\'s estates. Leased Wexford Harbour to reclaim 1,100 acres from the sea','💥 "An unprecedented high tide destroyed in one hour the labour of more than seven years" — loss £40,000','Emigrated while poor. Arrived Tasmania 2 Feb 1824 on *Derwent* (NOT William Shand) with wife, 7 children, 3 servants','Colonial Treasurer of Van Diemen\'s Land 1825–32. Member of Executive Council.','💰 TREASURY SCANDAL: snap audit 23 Oct 1832 found £10,627 shortage. Admitted it but denied misappropriation — claimed unreported robberies. Dismissed.','Collector O\'Ferrall also dismissed — later convicted of FORGING DEEDS','All properties sold. Retired to sons\' homes. Lord Stanhope wrote: "His character is irreproachable"','Henry Savery described: "a hurried quickness in his manner, a sort of absentism... a little of the brogue"','A granddaughter remembered him walking "very erect" in the garden at North Down','40+ grandchildren at death. Charlotte died 13 Nov 1873.','⚡ The founding patriarch — everything traces back here','📖 ADB biography by H.R. Thomas (probably Harold Thomas, who also wrote "Sam Thomas and His Neighbours")'], key: true },
  { id: 'capt_bart', name: 'Capt. Bartholomew B. Thomas', family: 'thomas', gen: 1, dates: '~1785–1831', detail: ['Military: Cornet 17th Light Dragoons (1805), Lt 9th Light Dragoons (1809), then 100th Regt, 4th Garrison Bn, 18th Regt. Resigned by sale of commission 1814.','⚔️ Served under BOLÍVAR in South America (c.1817-1824). Context: after Napoleonic Wars, 7,000+ British/Irish veterans joined Bolivar\'s "British Legions." An Irish Legion of 1,700 men was formed.','Arrived Tasmania 3 May 1826 on *Albion*. Brought AUSTRALIA\'S FIRST HEREFORD CATTLE + Cleveland/Flemish horses, Shorthorn cattle, Merino/Leicester/Southdown sheep. More than half the horses died.','Schooner *Sally* wrecked 30 Jun 1826 near Ringarooma — 13 lives lost (T. Johnson, J. Whatham, Elizabeth Willett + 5 children, J. Brown, Sarah Pilcher, Sarah Hooker) + uninsured machinery','Founded Cressy Company (6+ partners, £24,000 capital, 20,000 acres). Named after Crécy (1346) "where ancestor was created Knight Banneret"','❓ KNIGHT BANNERET QUESTION: ADB says Crécy 1346, but a REES AP THOMAS was made Knight Banneret at Battle of Blackheath 1497 (Cornish Rebellion). "Ap Thomas" = Welsh for "son of Thomas." Family may have TWO Knight Banneret ancestors, or conflated events 150 years apart.','Partnership dissolved 28 Jun 1828. Became "first settler in Devon" — 2,200 acres west of Port Sorell with Jocelyn\'s help','🕊️ Uniquely established FRIENDLY RELATIONS with local Aboriginal tribes while most of island saw frequent killings','⚔️ KILLED 31 Aug 1831: Speared to death along with overseer James Parker by warriors led by MONTPELLIATTA (c.1790-1836), Big River clan leader and key organiser of Aboriginal resistance. Montpelliatta had led raids northward from the highlands — this was "one of the worst and last atrocities" of the Black War. He surrendered Dec 1831, was exiled to Flinders Island.','ADB: "Imaginative, impulsive and altruistic... generous and likeable... physically uncommonly active"','Married Louisa 1811 — no children. Louisa mothered sister Marianne Burrell\'s 4 orphaned children. Widow died Stoke Damerel, Devon, 12 Apr 1862.','North Down property STILL in hands of Jocelyn\'s descendants. Private Thomas burial ground at Northdown.','📖 Sources: ADB (shared entry with Jocelyn, by H.R. Thomas) | Cressy Company: UTAS Companion to Tasmanian History | Sally wreck: Seafarers Memorial'] },
  { id: 'charlotte_p', name: 'Charlotte Partridge', family: 'other', gen: 1, dates: '', detail: ['Daughter of the Chief Justice of Ely','Married Jocelyn 11 Apr 1808','Made the voyage to Van Diemen\'s Land with 7 children'] },

  // Gen 2
  { id: 'bat', name: '"Bat" Thomas', family: 'thomas', gen: 2, dates: '', detail: ['Bartholomew John William Thomas','Granted 500 acres on South Esk (became Milford)','Established "Appledore" estate west of River Mersey, 1854','🍎 THIS is the Thomas apple farm — orchards of apples, pears, apricots, cherries','His journals survive — held by University of Tasmania?','❓ Did his line stay entirely in Tasmania?'] },
  { id: 'samuel', name: 'Samuel H.L. Thomas', family: 'thomas', gen: 2, dates: '1813–1883', detail: ['Samuel Henry Leipsig Thomas — born England','Married Barbara Moore (1820–1861, Dublin) — she died young at 41','🔑 KEY ANCESTOR: his wife\'s maiden name MOORE is the source of Patrick\'s middle name "Moor(e)"','Had son Owen who moved to Hillston, NSW — "Sam had too many sons"','Also had son Turton who stayed in Tasmania','❓ How many other children did Samuel have? Three of Jocelyn\'s sons are completely untraced'], key: true },
  { id: 'barbara_moore', name: 'Barbara Moore', family: 'other', gen: 2, dates: '1820–1861', detail: ['Born Summer Hill, Dublin, Ireland','Died young, age 41','🔑 Her maiden name MOORE passed down as Patrick\'s middle name — a common Australian naming convention','❓ What were the circumstances of her early death?'] },

  // Gen 3
  { id: 'owen', name: 'Owen Moore Thomas', family: 'thomas', gen: 3, dates: '', detail: ['Son of Samuel — the one who left Tasmania','Full name: Owen MOORE Thomas — middle name from grandmother Barbara Moore','Married Phyllis Constance Youl, 8 July 1908, St Andrew\'s Church, PERTH TASMANIA','Libraries Tasmania marriage record: File 904, Reg 1908','Moved to Hillston/Albury district, NSW — land was cheaper, "Sam had too many sons"','Patrick born 1917 in ALBURY district (not Hillston) — family may have moved around NSW','❓ Birth and death dates still unknown — Gregory may know'], key: true },
  { id: 'phyllis', name: 'Phyllis Constance Youl', family: 'youl', gen: 3, dates: '', detail: ['Full name confirmed: Phyllis CONSTANCE Youl (Libraries Tasmania marriage record)','Youl family arrived Tasmania 1818 with Rev. John Youl — one of the founding families','🏛️ Connected to SIR JAMES ARNDELL YOUL KCMG (1811-1904) — famous for introducing BROWN TROUT to Australia. Family seat: Symmons Plains, Perth TAS, held by 7 generations of Youls.','Sir James\'s son ALFRED YOUL MLA, MLC (1849-1921) had 3 sons + 4 daughters. Phyllis may be among them, or from another branch.','Alfred\'s son Geoffrey Arthur Douglas Youl MC — WWI Military Cross, commanded 2nd/40th Battalion at Darwin in WWII','Alfred\'s son John Beresford Osmond Youl — killed at Bullecourt, France, 1917','Thomas-Youl families already intermarried: Turton\'s grandson married a Youl descendant (via Nankivell)','Married Owen at St Andrew\'s Church, Perth TAS, 8 Jul 1908 (File 904, Reg 1908)','❓ Exact parentage within Youl family needs Libraries Tasmania birth/marriage records','📖 Sources: ADB (Sir James Arndell Youl, Alfred Youl) | UTAS Companion to Tasmanian History (Youl Family)'] },
  { id: 'turton', name: 'Turton Samuel Thomas', family: 'thomas', gen: 3, dates: '1846–1914', detail: ['Stayed in Tasmania (Norwood)','Married Kate Gertrude Douglas','His grandson Jocelyn Langslow Thomas (1886–1961) had 8 children who mostly stayed in Tasmania','This is the branch that kept the Appledore/North Down connection alive','🆕 Notable descendant: DANIEL RHYS THOMAS AM (b. 1 May 1931, Latrobe TAS) — inaugural Senior Curator of Australian Art at NGA (1978), Director Art Gallery of SA (1984-90). Middle name "Rhys" = Welsh. Home "Loeyunnila" at Northdown. Archibald Prize portrait 2005.','🆕 SNOW THOMAS organised the Thomas Tasmanian Bicentennial 2024 (2-4 Feb) at Northdown. Events: dinner at Hawley House, service at St James Church, visit to historic Northdown sites + Daniel\'s home','📖 Book: "Sam Thomas and His Neighbours" by Harold Thomas (1972/1975) — NLA catalogue #2480086. Full title: "North Down: being an account of Sam Thomas and his neighbours and their part in the development of Port Sorell, Latrobe and Devonport"'] },

  // Gen 4 — Owen's children

  { id: 'patrick', name: 'Patrick Moore Thomas', family: 'thomas', gen: 4, dates: '1917–2012', detail: ['Born 12 Jul 1917, Albury district — NSW BDM reg 30659/1917. Father: OWEN M, Mother: PHYLLIS C','Middle name MOORE confirmed — from great-grandmother Barbara Moore of Dublin','Grew up in Hillston, NSW (not Yass as initially thought)','Married Jean MacAlister Gibson (29 Dec 1922 – 3 Mar 2000)','Moved to Wollongong — ran engineering business supplying BHP with mining equipment','Middle name "Moor(e)" traces back 4 generations to great-grandmother Barbara Moore of Dublin','Five children: Gregory, Michael, Peter, Cate, Robin','❓ What was the engineering business called? No online trace found','📖 Featured in "Sam Thomas and His Neighbours" by Harold Thomas (1970s)'], key: true },
  { id: 'frank', name: 'Capt. O.F.Y. Thomas', family: 'thomas', gen: 4, dates: 'd. 23 Mar 1946', detail: ['Full name: Captain Owen Frank Youl Thomas','One of Qantas\'s EARLIEST pilots — veteran of the Indian Ocean "Double Sunrise" service','✈️ WWII: civilian pilot ferrying people to/from OCCUPIED SINGAPORE in a float plane','🏆 8 NOV 1944: Set RECORD for Indian Ocean civil service — Ceylon to WA in 17½ hours, 3,600mi nonstop in a Liberator','VIP passenger on record flight: Sir Ronald Cross, British High Commissioner. Journalist Geoffrey Tebbutt wrote: "Captain Thomas was up there peering below his long eyeshade for ways through or round the turbulent masses of cumulus"','By Nov 1944 had made 20+ round flights on the world\'s longest nonstop civil air route — navigating by stars and dead reckoning under radio silence','✈️ 23 MAR 1946: Disappeared commanding Avro Lancastrian G-AGLX (MSN 1178, ex-Lancaster VF165, Rolls-Royce Merlins) en route Negombo, Ceylon → Cocos Islands','Departure delayed 2 HOURS due to radio fault. Last report 18:00 Perth time, ~1,600mi from Colombo. 18:30 report never came.','Crew: First Officer McClelland, Navigator Nuske, Radio Officer McBean, Steward Porteous. All 5 crew from NSW.','Passengers: Jack Dobson (son of AVRO\'s MD Sir Roy Dobson, heading to launch Lincoln production), J. Knight, H. Marshland, J.H. Vose, H.E. Wittey','Thomas\'s pre-flight plan had LEARMONTH as alternative landfall if bypassing Cocos','15 aircraft searched from Ceylon, Cocos, Learmonth, Darwin, Java. Faint dinghy-transmitter signal heard by RAF Liberator, dusk 24 Mar','5 APR 1946: HELIOGRAPH SIGNALS intercepted near Beagle Bay Mission, 90mi north of Broome! Plane carried 2 dinghies with food, water, heliograph equipment. Qantas would neither confirm nor deny.','NO trace ever found. Registration cancelled as "Lost at Sea"','Probate notice (The Age, 1 May 1947): "late of Sydney, but formerly of Hillston" — confirms father Owen\'s NSW connection','📖 Sources: Trove articles 78250017, 78765123, 50334537 | ASN: aviation-safety.net/asndb/337366 | Book: "Double Sunrise" by Geoff Goodall'] },

// Build
const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select('#graph')
  .attr('width', width)
  .attr('height', height);

const defs = svg.append('defs');

// Glow filter
const filter = defs.append('filter').attr('id', 'glow');
filter.append('feGaussianBlur').attr('stdDeviation', 3).attr('result', 'blur');
const merge = filter.append('feMerge');
merge.append('feMergeNode').attr('in', 'blur');
merge.append('feMergeNode').attr('in', 'SourceGraphic');

const g = svg.append('g');

const zoom = d3.zoom()
  .scaleExtent([0.15, 4])
  .on('zoom', (e) => g.attr('transform', e.transform));

svg.call(zoom);

// Simulation
const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.type === 'spouse' ? 50 : 80).strength(d => d.type === 'spouse' ? 1.2 : 0.6))
  .force('charge', d3.forceManyBody().strength(-320))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('y', d3.forceY(d => 100 + d.gen * 90).strength(0.12))
  .force('collision', d3.forceCollide(30))
  .alphaDecay(0.012);

// Links
function linkColor(d) {
  if (d.type === 'spouse') return getComputedStyle(document.documentElement).getPropertyValue('--link-spouse').trim();
  return getComputedStyle(document.documentElement).getPropertyValue('--link-parent').trim();
}

const linkGroup = g.append('g').attr('class', 'link-group');
let link = linkGroup.selectAll('line')
  .data(links)
  .join('line')
  .attr('stroke', linkColor)
  .attr('stroke-width', d => d.type === 'spouse' ? 1.2 : 2)
  .attr('stroke-dasharray', d => d.type === 'spouse' ? '4,5' : 'none')
  .attr('stroke-linecap', 'round');

const nodeGroup = g.append('g').attr('class', 'node-group');

// Nodes
let node = nodeGroup.selectAll('g')
  .data(nodes)
  .join('g')
  .attr('cursor', 'pointer')
  .call(d3.drag()
    .on('start', dragstarted)
    .on('drag', dragged)
    .on('end', dragended));

// Node circles
node.append('circle')
  .attr('r', d => d.key ? 10 : d.id === 'hardy' ? 12 : 7)
  .attr('fill', d => families[d.family]?.color || '#888')
  .attr('stroke', d => d.key ? families[d.family]?.color || '#888' : 'none')
  .attr('stroke-width', d => d.key ? 2 : 0)
  .attr('stroke-opacity', 0.3)
  .attr('fill-opacity', d => d.key ? 1 : 0.7)
  .style('filter', d => d.id === 'hardy' ? 'url(#glow)' : 'none');

// Outer ring for Hardy
node.filter(d => d.id === 'hardy')
  .append('circle')
  .attr('r', 18)
  .attr('fill', 'none')
  .attr('stroke', families.thomas.color)
  .attr('stroke-width', 1)
  .attr('stroke-opacity', 0.2)
  .attr('stroke-dasharray', '2,3');

// Labels
node.append('text')
  .attr('class', d => d.key || d.id === 'hardy' ? 'node-label node-label-main' : 'node-label')
  .attr('dy', d => (d.key || d.id === 'hardy') ? -16 : -12)
  .text(d => {
    const parts = d.name.split(' ');
    if (parts.length <= 2) return d.name;
    // Abbreviate: first name + last name
    return parts[0] + ' ' + parts[parts.length - 1];
  });

// Click handler
node.on('click', (event, d) => {
  event.stopPropagation();
  showPanel(d);
});

svg.on('click', () => closePanel());

// Simulation tick
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);

  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// Drag handlers
function dragstarted(event) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  event.subject.fx = event.subject.x;
  event.subject.fy = event.subject.y;
}
function dragged(event) {
  event.subject.fx = event.x;
  event.subject.fy = event.y;
}
function dragended(event) {
  if (!event.active) simulation.alphaTarget(0);
  event.subject.fx = null;
  event.subject.fy = null;
}

// Panel
function showPanel(d) {
  const fam = families[d.family] || families.other;
  const panel = document.getElementById('panel-content');
  const details = d.detail.length
    ? `<ul class="detail">${d.detail.map(x => `<li>${x}</li>`).join('')}</ul>`
    : '';
  const isUser = d.id.startsWith('usr_');
  const editBtns = isUser ? `<div style="display:flex;gap:8px;margin-top:12px">
    <button onclick="editPerson('${d.id}')" style="padding:6px 14px;background:rgba(196,149,106,0.2);border:1px solid rgba(196,149,106,0.4);border-radius:4px;color:var(--thomas);font-size:12px;cursor:pointer">Edit</button>
    <button onclick="deletePerson('${d.id}')" style="padding:6px 14px;background:rgba(200,80,80,0.2);border:1px solid rgba(200,80,80,0.4);border-radius:4px;color:#c49a9a;font-size:12px;cursor:pointer">Remove</button>
  </div>` : '';
  panel.innerHTML = `
    <span class="family-tag" style="background:${fam.dim};color:${fam.color}">${fam.label}</span>
    <div class="name" style="color:${fam.color}">${d.name}</div>
    <div class="dates">${d.dates || ''}</div>
    ${details}
    ${editBtns}
  `;
  document.getElementById('info-panel').classList.add('open');

  // Highlight connections
  const connected = new Set();
  links.forEach(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });
  connected.add(d.id);

  node.select('circle:first-child')
    .transition().duration(300)
    .attr('fill-opacity', n => connected.has(n.id) ? 1 : 0.12);

  link.transition().duration(300)
    .attr('stroke-opacity', l => {
      const sid = typeof l.source === 'object' ? l.source.id : l.source;
      const tid = typeof l.target === 'object' ? l.target.id : l.target;
      return (sid === d.id || tid === d.id) ? 1 : 0.06;
    })
    .attr('stroke-width', l => {
      const sid = typeof l.source === 'object' ? l.source.id : l.source;
      const tid = typeof l.target === 'object' ? l.target.id : l.target;
      return (sid === d.id || tid === d.id) ? 3 : (l.type === 'spouse' ? 1.2 : 2);
    });

  node.selectAll('.node-label')
    .transition().duration(300)
    .attr('fill-opacity', n => connected.has(n.id) ? 1 : 0.15);
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('open');
  node.select('circle:first-child')
    .transition().duration(400)
    .attr('fill-opacity', d => d.key ? 1 : 0.7);
  link.transition().duration(400)
    .attr('stroke-opacity', 1)
    .attr('stroke-width', d => d.type === 'spouse' ? 1.2 : 2);
  node.selectAll('.node-label')
    .transition().duration(400)
    .attr('fill-opacity', 1);
}

// Legend
const legendEl = document.getElementById('legend');
Object.entries(families).forEach(([key, val]) => {
  if (key === 'other') return;
  const el = document.createElement('div');
  el.className = 'legend-item';
  el.innerHTML = `<span class="legend-dot" style="background:${val.color}"></span>${val.label}`;
  el.onclick = () => {
    const matching = nodes.filter(n => n.family === key);
    if (matching.length) {
      const cx = matching.reduce((s, n) => s + n.x, 0) / matching.length;
      const cy = matching.reduce((s, n) => s + n.y, 0) / matching.length;
      svg.transition().duration(700).call(
        zoom.transform,
        d3.zoomIdentity.translate(width/2 - cx, height/2 - cy).scale(1.2)
      );
    }
  };
  legendEl.appendChild(el);
});

function populateLinkTargets() {
  const sel = document.getElementById('add-link-target');
  sel.innerHTML = '<option value="">(none)</option>';
  nodes.slice().sort((a,b) => a.name.localeCompare(b.name)).forEach(n => {
    sel.innerHTML += `<option value="${n.id}">${n.name}</option>`;
  });
}
populateLinkTargets();

function toggleAddPanel() {
  const panel = document.getElementById('add-panel');
  if (panel.classList.contains('open')) {
    resetAddForm();
  } else {
    panel.classList.add('open');
  }
}

function addPerson() {
  const name = document.getElementById('add-name').value.trim();
  if (!name) return;
  const family = document.getElementById('add-family').value;
  const dates = document.getElementById('add-dates').value.trim();
  const details = document.getElementById('add-details').value.split('\n').filter(x => x.trim());
  const key = document.getElementById('add-key').checked;
  const linkTarget = document.getElementById('add-link-target').value;
  const linkType = document.getElementById('add-link-type').value;

  if (editingId) {
    // Update existing node
    const existing = nodes.find(n => n.id === editingId);
    if (existing) {
      existing.name = name;
      existing.family = family;
      existing.dates = dates;
      existing.detail = details;
      existing.key = key;
      if (linkTarget) {
        existing.gen = linkType === 'parent'
          ? (nodes.find(n => n.id === linkTarget)?.gen || 2) + 1
          : (nodes.find(n => n.id === linkTarget)?.gen || 3);
      }
      // Remove old links for this node, add new one
      for (let i = links.length - 1; i >= 0; i--) {
        const sid = typeof links[i].source === 'object' ? links[i].source.id : links[i].source;
        const tid = typeof links[i].target === 'object' ? links[i].target.id : links[i].target;
        if ((sid === editingId || tid === editingId) && (sid.startsWith('usr_') || tid.startsWith('usr_'))) {
          links.splice(i, 1);
        }
      }
      if (linkTarget) {
        links.push(linkType === 'parent'
          ? { source: linkTarget, target: editingId, type: 'parent' }
          : { source: editingId, target: linkTarget, type: 'spouse' });
      }
      // Update label in DOM
      nodeGroup.selectAll('g').filter(d => d.id === editingId).select('text')
        .text(() => { const p = name.split(' '); return p.length <= 2 ? name : p[0]+' '+p[p.length-1]; });
    }
    editingId = null;
  } else {
    // New node
    let id = 'usr_' + name.toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/_+/g, '_');
    let suffix = 0;
    while (nodes.find(n => n.id === id)) { suffix++; id = id.replace(/_\d+$/, '') + '_' + suffix; }

    let gen = 3;
    if (linkTarget) {
      const parent = nodes.find(n => n.id === linkTarget);
      if (parent) gen = linkType === 'parent' ? parent.gen + 1 : parent.gen;
    }

    nodes.push({ id, name, family, gen, dates, detail: details, key });
    if (linkTarget) {
      links.push(linkType === 'parent'
        ? { source: linkTarget, target: id, type: 'parent' }
        : { source: id, target: linkTarget, type: 'spouse' });
    }
  }

  rebuildGraph();
  saveUserNodes();
  resetAddForm();
  updateAddedCount();
}

function resetAddForm() {
  document.getElementById('add-name').value = '';
  document.getElementById('add-dates').value = '';
  document.getElementById('add-details').value = '';
  document.getElementById('add-key').checked = false;
  document.getElementById('add-link-target').value = '';
  document.querySelector('.btn-save').textContent = 'Add';
  document.getElementById('add-panel').querySelector('h3').textContent = 'Add Person';
  editingId = null;
  document.getElementById('add-panel').classList.remove('open');
}

function rebuildGraph() {
  // Rejoin links — update module-level `link`
  link = linkGroup.selectAll('line').data(links);
  link.exit().remove();
  link = link.enter().append('line').merge(link)
    .attr('stroke', linkColor)
    .attr('stroke-width', d => d.type === 'spouse' ? 1.2 : 2)
    .attr('stroke-dasharray', d => d.type === 'spouse' ? '4,5' : 'none')
    .attr('stroke-linecap', 'round');

  // Rejoin nodes — update module-level `node`
  node = nodeGroup.selectAll('g').data(nodes, d => d.id);
  const enter = node.enter().append('g')
    .attr('cursor', 'pointer')
    .call(d3.drag().on('start', dragstarted).on('drag', dragged).on('end', dragended));
  enter.append('circle')
    .attr('r', d => d.key ? 10 : 7)
    .attr('fill', d => families[d.family]?.color || '#888')
    .attr('stroke', d => d.key ? families[d.family]?.color || '#888' : 'none')
    .attr('stroke-width', d => d.key ? 2 : 0)
    .attr('stroke-opacity', 0.3)
    .attr('fill-opacity', d => d.key ? 1 : 0.7);
  enter.append('text')
    .attr('class', d => d.key ? 'node-label node-label-main' : 'node-label')
    .attr('dy', d => d.key ? -16 : -12)
    .text(d => { const p = d.name.split(' '); return p.length <= 2 ? d.name : p[0]+' '+p[p.length-1]; });
  enter.on('click', (event, d) => { event.stopPropagation(); showPanel(d); });
  node = enter.merge(node);

  // Update simulation
  simulation.nodes(nodes);
  simulation.force('link').links(links);
  simulation.alpha(0.5).restart();
  populateLinkTargets();
}

// localStorage persistence for user-added nodes
const STORAGE_KEY = 'thomas-pirola-user-nodes';

function saveUserNodes() {
  const userNodes = nodes.filter(n => n.id.startsWith('usr_'));
  const userLinks = links.filter(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return sid.startsWith('usr_') || tid.startsWith('usr_');
  }).map(l => ({
    source: typeof l.source === 'object' ? l.source.id : l.source,
    target: typeof l.target === 'object' ? l.target.id : l.target,
    type: l.type
  }));
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ nodes: userNodes, links: userLinks }));
}

function loadUserNodes() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (!saved) return;
  try {
    const data = JSON.parse(saved);
    data.nodes.forEach(n => { if (!nodes.find(x => x.id === n.id)) nodes.push(n); });
    data.links.forEach(l => { if (!links.find(x => (typeof x.source === 'object' ? x.source.id : x.source) === l.source && (typeof x.target === 'object' ? x.target.id : x.target) === l.target)) links.push(l); });
    rebuildGraph();
    updateAddedCount();
  } catch(e) {}
}

function exportAdded() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (!saved) return;
  const data = JSON.parse(saved);
  const text = '// User-added nodes\n' +
    data.nodes.map(n => `  { id: '${n.id}', name: '${n.name.replace(/'/g,"\\'")}', family: '${n.family}', gen: ${n.gen}, dates: '${(n.dates||'').replace(/'/g,"\\'")}', detail: [${n.detail.map(d => `'${d.replace(/'/g,"\\'")}'`).join(', ')}]${n.key ? ', key: true' : ''} },`).join('\n') +
    '\n\n// User-added links\n' +
    data.links.map(l => `  { source: '${l.source}', target: '${l.target}', type: '${l.type}' },`).join('\n');
  const btn = document.querySelector('.btn-export');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Export added people (copy)', 2000);
    });
  } else {
    // Fallback for file:// and non-HTTPS
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Export added people (copy)', 2000);
  }
}

function updateAddedCount() {
  const saved = localStorage.getItem(STORAGE_KEY);
  const el = document.getElementById('added-count');
  if (!saved) { el.textContent = ''; return; }
  const count = JSON.parse(saved).nodes.length;
  el.textContent = count ? `${count} person${count > 1 ? 's' : ''} added locally` : '';
}

let editingId = null;

function editPerson(id) {
  const person = nodes.find(n => n.id === id);
  if (!person) return;
  editingId = id;
  closePanel();
  document.getElementById('add-name').value = person.name;
  document.getElementById('add-family').value = person.family;
  document.getElementById('add-dates').value = person.dates || '';
  document.getElementById('add-details').value = (person.detail || []).join('\n');
  document.getElementById('add-key').checked = !!person.key;
  // Find existing link
  const existingLink = links.find(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return tid === id || sid === id;
  });
  if (existingLink) {
    const sid = typeof existingLink.source === 'object' ? existingLink.source.id : existingLink.source;
    const tid = typeof existingLink.target === 'object' ? existingLink.target.id : existingLink.target;
    if (existingLink.type === 'parent' && sid !== id) {
      document.getElementById('add-link-target').value = sid;
      document.getElementById('add-link-type').value = 'parent';
    } else if (existingLink.type === 'spouse') {
      document.getElementById('add-link-target').value = sid === id ? tid : sid;
      document.getElementById('add-link-type').value = 'spouse';
    }
  }
  // Change button text
  document.querySelector('.btn-save').textContent = 'Update';
  document.getElementById('add-panel').querySelector('h3').textContent = 'Edit Person';
  document.getElementById('add-panel').classList.add('open');
}

function deletePerson(id) {
  const idx = nodes.findIndex(n => n.id === id);
  if (idx === -1) return;
  nodes.splice(idx, 1);
  // Remove links involving this node
  for (let i = links.length - 1; i >= 0; i--) {
    const sid = typeof links[i].source === 'object' ? links[i].source.id : links[i].source;
    const tid = typeof links[i].target === 'object' ? links[i].target.id : links[i].target;
    if (sid === id || tid === id) links.splice(i, 1);
  }
  closePanel();
  rebuildGraph();
  simulation.force('link').links(links);
  simulation.alpha(0.3).restart();
  saveUserNodes();
  updateAddedCount();
  populateLinkTargets();
}

// Load saved people on startup
loadUserNodes();

// Initial zoom to fit
setTimeout(() => {
  svg.transition().duration(1000).call(
    zoom.transform,
    d3.zoomIdentity.translate(width * 0.1, -20).scale(0.85)
  );
}, 1500);
</script>
</body>

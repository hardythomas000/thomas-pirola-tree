</style>

const links = [
  // Thomas ancestry
  { source: 'rev_bart', target: 'jocelyn', type: 'parent' },
  { source: 'rev_bart', target: 'capt_bart', type: 'parent' },
  { source: 'jocelyn', target: 'charlotte_p', type: 'spouse' },
  { source: 'jocelyn', target: 'bat', type: 'parent' },
  { source: 'jocelyn', target: 'samuel', type: 'parent' },
  { source: 'samuel', target: 'barbara_moore', type: 'spouse' },
  { source: 'samuel', target: 'owen', type: 'parent' },
  { source: 'samuel', target: 'turton', type: 'parent' },
  { source: 'owen', target: 'phyllis', type: 'spouse' },
  { source: 'owen', target: 'ken', type: 'parent' },
  { source: 'owen', target: 'patrick', type: 'parent' },
  { source: 'owen', target: 'frank', type: 'parent' },
  { source: 'patrick', target: 'jean', type: 'spouse' },
  { source: 'patrick', target: 'gregory', type: 'parent' },
  { source: 'patrick', target: 'michael_t', type: 'parent' },
  { source: 'patrick', target: 'peter_t', type: 'parent' },
  { source: 'patrick', target: 'cate', type: 'parent' },
  { source: 'patrick', target: 'robin', type: 'parent' },

  // Pirola ancestry
  { source: 'luigi_gg', target: 'luigi_g', type: 'parent' },
  { source: 'luigi_g', target: 'maria_r', type: 'spouse' },
  { source: 'luigi_g', target: 'gino_sr', type: 'parent' },
  { source: 'luigi_g', target: 'paolo', type: 'parent' },
  { source: 'luigi_g', target: 'alice_p', type: 'parent' },
  { source: 'gino_sr', target: 'grace', type: 'spouse' },
  { source: 'gino_sr', target: 'gino_jr', type: 'parent' },
  { source: 'gino_sr', target: 'ron', type: 'parent' },
  { source: 'gino_sr', target: 'gaie', type: 'parent' },
  { source: 'gino_sr', target: 'mark_p', type: 'parent' },
  { source: 'gino_jr', target: 'roma', type: 'spouse' },
  { source: 'gino_jr', target: 'hanna', type: 'parent' },

  // Barlow ancestry
  { source: 'fred_barlow', target: 'sarah_r', type: 'spouse' },
  { source: 'fred_barlow', target: 'arthur_b', type: 'parent' },
  { source: 'arthur_b', target: 'grace', type: 'parent' },

  // Gibson ancestry
  { source: 'wm_gibson', target: 'mary_mca', type: 'spouse' },

  // Hardy's parents + Hardy
  { source: 'gregory', target: 'hanna', type: 'spouse' },

// Build
const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select('#graph')
  .attr('width', width)
  .attr('height', height);

const defs = svg.append('defs');

// Glow filter
const filter = defs.append('filter').attr('id', 'glow');
filter.append('feGaussianBlur').attr('stdDeviation', 3).attr('result', 'blur');
const merge = filter.append('feMerge');
merge.append('feMergeNode').attr('in', 'blur');
merge.append('feMergeNode').attr('in', 'SourceGraphic');

const g = svg.append('g');

const zoom = d3.zoom()
  .scaleExtent([0.15, 4])
  .on('zoom', (e) => g.attr('transform', e.transform));

svg.call(zoom);

// Simulation
const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(d => d.type === 'spouse' ? 50 : 80).strength(d => d.type === 'spouse' ? 1.2 : 0.6))
  .force('charge', d3.forceManyBody().strength(-320))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('y', d3.forceY(d => 100 + d.gen * 90).strength(0.12))
  .force('collision', d3.forceCollide(30))
  .alphaDecay(0.012);

// Links
function linkColor(d) {
  if (d.type === 'spouse') return getComputedStyle(document.documentElement).getPropertyValue('--link-spouse').trim();
  return getComputedStyle(document.documentElement).getPropertyValue('--link-parent').trim();
}

const link = g.append('g')
  .selectAll('line')
  .data(links)
  .join('line')
  .attr('stroke', linkColor)
  .attr('stroke-width', d => d.type === 'spouse' ? 1.2 : 2)
  .attr('stroke-dasharray', d => d.type === 'spouse' ? '4,5' : 'none')
  .attr('stroke-linecap', 'round');

// Nodes
const node = g.append('g')
  .selectAll('g')
  .data(nodes)
  .join('g')
  .attr('cursor', 'pointer')
  .call(d3.drag()
    .on('start', dragstarted)
    .on('drag', dragged)
    .on('end', dragended));

// Node circles
node.append('circle')
  .attr('r', d => d.key ? 10 : d.id === 'hardy' ? 12 : 7)
  .attr('fill', d => families[d.family]?.color || '#888')
  .attr('stroke', d => d.key ? families[d.family]?.color || '#888' : 'none')
  .attr('stroke-width', d => d.key ? 2 : 0)
  .attr('stroke-opacity', 0.3)
  .attr('fill-opacity', d => d.key ? 1 : 0.7)
  .style('filter', d => d.id === 'hardy' ? 'url(#glow)' : 'none');

// Outer ring for Hardy
node.filter(d => d.id === 'hardy')
  .append('circle')
  .attr('r', 18)
  .attr('fill', 'none')
  .attr('stroke', families.thomas.color)
  .attr('stroke-width', 1)
  .attr('stroke-opacity', 0.2)
  .attr('stroke-dasharray', '2,3');

// Labels
node.append('text')
  .attr('class', d => d.key || d.id === 'hardy' ? 'node-label node-label-main' : 'node-label')
  .attr('dy', d => (d.key || d.id === 'hardy') ? -16 : -12)
  .text(d => {
    const parts = d.name.split(' ');
    if (parts.length <= 2) return d.name;
    // Abbreviate: first name + last name
    return parts[0] + ' ' + parts[parts.length - 1];
  });

// Click handler
node.on('click', (event, d) => {
  event.stopPropagation();
  showPanel(d);
});

svg.on('click', () => closePanel());

// Simulation tick
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);

  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// Drag handlers
function dragstarted(event) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  event.subject.fx = event.subject.x;
  event.subject.fy = event.subject.y;
}
function dragged(event) {
  event.subject.fx = event.x;
  event.subject.fy = event.y;
}
function dragended(event) {
  if (!event.active) simulation.alphaTarget(0);
  event.subject.fx = null;
  event.subject.fy = null;
}

// Panel
function showPanel(d) {
  const fam = families[d.family] || families.other;
  const panel = document.getElementById('panel-content');
  const details = d.detail.length
    ? `<ul class="detail">${d.detail.map(x => `<li>${x}</li>`).join('')}</ul>`
    : '';
  panel.innerHTML = `
    <span class="family-tag" style="background:${fam.dim};color:${fam.color}">${fam.label}</span>
    <div class="name" style="color:${fam.color}">${d.name}</div>
    <div class="dates">${d.dates || ''}</div>
    ${details}
  `;
  document.getElementById('info-panel').classList.add('open');

  // Highlight connections
  const connected = new Set();
  links.forEach(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });
  connected.add(d.id);

  node.select('circle:first-child')
    .transition().duration(300)
    .attr('fill-opacity', n => connected.has(n.id) ? 1 : 0.12);

  link.transition().duration(300)
    .attr('stroke-opacity', l => {
      const sid = typeof l.source === 'object' ? l.source.id : l.source;
      const tid = typeof l.target === 'object' ? l.target.id : l.target;
      return (sid === d.id || tid === d.id) ? 1 : 0.06;
    })
    .attr('stroke-width', l => {
      const sid = typeof l.source === 'object' ? l.source.id : l.source;
      const tid = typeof l.target === 'object' ? l.target.id : l.target;
      return (sid === d.id || tid === d.id) ? 3 : (l.type === 'spouse' ? 1.2 : 2);
    });

  node.selectAll('.node-label')
    .transition().duration(300)
    .attr('fill-opacity', n => connected.has(n.id) ? 1 : 0.15);
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('open');
  node.select('circle:first-child')
    .transition().duration(400)
    .attr('fill-opacity', d => d.key ? 1 : 0.7);
  link.transition().duration(400)
    .attr('stroke-opacity', 1)
    .attr('stroke-width', d => d.type === 'spouse' ? 1.2 : 2);
  node.selectAll('.node-label')
    .transition().duration(400)
    .attr('fill-opacity', 1);
}

// Legend
const legendEl = document.getElementById('legend');
Object.entries(families).forEach(([key, val]) => {
  if (key === 'other') return;
  const el = document.createElement('div');
  el.className = 'legend-item';
  el.innerHTML = `<span class="legend-dot" style="background:${val.color}"></span>${val.label}`;
  el.onclick = () => {
    const matching = nodes.filter(n => n.family === key);
    if (matching.length) {
      const cx = matching.reduce((s, n) => s + n.x, 0) / matching.length;
      const cy = matching.reduce((s, n) => s + n.y, 0) / matching.length;
      svg.transition().duration(700).call(
        zoom.transform,
        d3.zoomIdentity.translate(width/2 - cx, height/2 - cy).scale(1.2)
      );
    }
  };
  legendEl.appendChild(el);
});

// Controls
function zoomIn() {
  svg.transition().duration(300).call(zoom.scaleBy, 1.4);
}
function zoomOut() {
  svg.transition().duration(300).call(zoom.scaleBy, 0.7);
}
function resetView() {
  svg.transition().duration(600).call(
    zoom.transform,
    d3.zoomIdentity.translate(0, 0).scale(1)
  );
}

// Theme toggle
function toggleTheme() {
  document.body.classList.toggle('light-mode');
  const isLight = document.body.classList.contains('light-mode');
  document.getElementById('theme-btn').textContent = isLight ? '☾' : '☀';
  // Update link colors
  link.attr('stroke', linkColor);
  // Update node label fills
  node.selectAll('.node-label')
    .attr('fill', () => getComputedStyle(document.documentElement).getPropertyValue('--text-dim').trim());
  node.selectAll('.node-label-main')
    .attr('fill', () => getComputedStyle(document.documentElement).getPropertyValue('--text').trim());
}

// Initial zoom to fit
setTimeout(() => {
  svg.transition().duration(1000).call(
    zoom.transform,
    d3.zoomIdentity.translate(width * 0.1, -20).scale(0.85)
  );
}, 1500);
</script>
</body>
